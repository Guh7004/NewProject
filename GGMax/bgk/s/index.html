<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Burger King Landing Page</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: 'Inter', sans-serif; }

    /* Flame effect */
    .flame-font {
      color: #FFBF00;
      text-shadow: 0 0 10px #D62300, 0 0 20px #FFBF00;
      animation: flameGlow 1.5s infinite alternate;
    }
    @keyframes flameGlow {
      from { text-shadow: 0 0 5px #D62300, 0 0 15px #FFBF00; }
      to { text-shadow: 0 0 20px #D62300, 0 0 30px #FFBF00; }
    }

    /* Loading */
    #loading-screen {
      position: fixed; inset: 0; background: white;
      display: flex; flex-direction: column; justify-content: center; align-items: center;
      z-index: 50;
    }
    .dots span { animation: blink 1.5s infinite; }
    .dots span:nth-child(2){ animation-delay: 0.3s; }
    .dots span:nth-child(3){ animation-delay: 0.6s; }
    @keyframes blink { 50% { opacity: 0; } }

    /* Carrossel */
    .carousel { perspective: 1200px; }
    .carousel-item {
      position: absolute; top: 0; left: 50%; transform-style: preserve-3d;
      transition: transform 0.7s ease, opacity 0.7s ease;
    }
    .carousel-item img { width: 200px; height: 200px; object-fit: contain; }
    .carousel-item.hidden { opacity: 0; pointer-events: none; }

    /* Ripple effect */
    .ripple { position: relative; overflow: hidden; }
    .ripple::after {
      content: ""; position: absolute; border-radius: 50%; transform: scale(0);
      background: rgba(255,255,255,0.6);
      width: 100%; height: 100%; left: 0; top: 0;
      transition: transform 0.6s ease;
    }
    .ripple:active::after { transform: scale(2.5); opacity: 0; }
  </style>
</head>

  <footer class="bg-black text-center text-white py-4 text-sm">

  </footer>

  <script>
    // Loading Screen
    setTimeout(() => {
      document.getElementById('loading-screen').style.display = 'none';
    }, 3000);

    // Carousel
    const items = document.querySelectorAll('.carousel-item');
    const total = items.length;
    let current = 1;
    const indicators = document.getElementById('indicators');

    // Criar indicadores
    for (let i = 0; i < total; i++) {
      const dot = document.createElement('div');
      dot.className = 'w-3 h-3 rounded-full bg-white/50 cursor-pointer';
      dot.dataset.index = i;
      dot.onclick = () => showSlide(i);
      indicators.appendChild(dot);
    }

    function updateCarousel() {
      items.forEach((item, i) => {
        let offset = (i - current + total) % total;
        if (offset === 0) {
          item.style.transform = 'translateX(-50%) scale(1)';
          item.style.zIndex = 2;
          item.style.opacity = 1;
        } else if (offset === 1) {
          item.style.transform = 'translateX(50%) scale(0.8)';
          item.style.zIndex = 1;
          item.style.opacity = 0.7;
        } else if (offset === total - 1) {
          item.style.transform = 'translateX(-150%) scale(0.8)';
          item.style.zIndex = 1;
          item.style.opacity = 0.7;
        } else {
          item.style.opacity = 0;
          item.style.zIndex = 0;
        }
      });

      indicators.querySelectorAll('div').forEach((dot, i) => {
        dot.className = i === current ? 'w-3 h-3 rounded-full bg-yellow-400' : 'w-3 h-3 rounded-full bg-white/50';
      });
    }

    function showSlide(index) {
      current = index;
      updateCarousel();
    }

    document.getElementById('prev').onclick = () => showSlide((current - 1 + total) % total);
    document.getElementById('next').onclick = () => showSlide((current + 1) % total);

    // Auto rotate
    let auto = setInterval(() => showSlide((current + 1) % total), 6000);

    document.querySelector('.carousel').addEventListener('mouseover', () => clearInterval(auto));
    document.querySelector('.carousel').addEventListener('mouseout', () => auto = setInterval(() => showSlide((current + 1) % total), 6000));

    // Navegação por teclado
    document.addEventListener('keydown', e => {
      if (e.key === 'ArrowLeft') showSlide((current - 1 + total) % total);
      if (e.key === 'ArrowRight') showSlide((current + 1) % total);
    });

    // Inicializar
    updateCarousel();
  </script>
</body>
</html>
